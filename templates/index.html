<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quick YouTube Downloader</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0d0d0d;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #f0f0f0;
      padding: 20px;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 560px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.6);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 32px;
    }

    .logo-icon {
      width: 48px;
      height: 48px;
      background: #ff0000;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo-icon svg { width: 26px; height: 26px; fill: white; }

    .logo-text h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .logo-text p {
      font-size: 13px;
      color: #888;
      margin-top: 2px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 8px;
    }

    .url-wrap {
      position: relative;
      margin-bottom: 20px;
    }

    .url-wrap input {
      width: 100%;
      padding: 14px 48px 14px 16px;
      background: #111;
      border: 1.5px solid #333;
      border-radius: 12px;
      color: #f0f0f0;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }

    .url-wrap input:focus { border-color: #ff0000; }
    .url-wrap input::placeholder { color: #555; }

    .clear-btn {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #666;
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      padding: 2px;
      display: none;
    }

    .clear-btn:hover { color: #aaa; }

    .dl-btn {
      width: 100%;
      padding: 16px;
      background: #ff0000;
      border: none;
      border-radius: 12px;
      color: white;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      letter-spacing: 0.3px;
    }

    .dl-btn:hover:not(:disabled) { background: #e00; }
    .dl-btn:active:not(:disabled) { transform: scale(0.98); }
    .dl-btn:disabled { background: #444; cursor: not-allowed; color: #888; }

    .progress-wrap {
      margin-top: 28px;
      display: none;
    }

    .stages {
      display: flex;
      align-items: center;
      gap: 0;
      margin-bottom: 18px;
    }

    .stage {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      flex: 1;
      position: relative;
    }

    .stage:not(:last-child)::after {
      content: '';
      position: absolute;
      top: 7px;
      left: calc(50% + 10px);
      right: calc(-50% + 10px);
      height: 2px;
      background: #2a2a2a;
      transition: background 0.4s;
    }

    .stage.done:not(:last-child)::after { background: #ff0000; }

    .stage-dot {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 2px solid #333;
      background: #111;
      transition: all 0.3s;
      position: relative;
      z-index: 1;
    }

    .stage.active .stage-dot {
      border-color: #ff0000;
      background: #ff0000;
      box-shadow: 0 0 0 4px rgba(255,0,0,0.15);
      animation: stagePulse 1.4s ease-in-out infinite;
    }

    .stage.done .stage-dot {
      border-color: #ff0000;
      background: #ff0000;
    }

    .stage-label {
      font-size: 11px;
      font-weight: 600;
      color: #444;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      transition: color 0.3s;
    }

    .stage.active .stage-label { color: #ff4444; }
    .stage.done .stage-label  { color: #888; }

    @keyframes stagePulse {
      0%, 100% { box-shadow: 0 0 0 4px rgba(255,0,0,0.15); }
      50%       { box-shadow: 0 0 0 7px rgba(255,0,0,0.05); }
    }

    .progress-bar-bg {
      background: #1e1e1e;
      border-radius: 10px;
      height: 10px;
      overflow: hidden;
      margin-bottom: 14px;
      position: relative;
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #cc0000, #ff5555);
      border-radius: 10px;
      width: 0%;
      transition: width 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }

    .progress-bar-fill::after {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 50%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.22), transparent);
      animation: shimmer 1.5s ease-in-out infinite;
    }

    @keyframes shimmer {
      0%   { transform: translateX(-200%); }
      100% { transform: translateX(400%); }
    }

    .progress-bar-fill.indeterminate {
      width: 100% !important;
      transition: none;
      background: linear-gradient(90deg, #111, #ff3333 40%, #ff6666 50%, #ff3333 60%, #111);
      background-size: 250% 100%;
      animation: sweep 1.6s ease-in-out infinite;
    }

    .progress-bar-fill.indeterminate::after { display: none; }

    @keyframes sweep {
      0%   { background-position: 100% 0; }
      100% { background-position: -100% 0; }
    }

    .progress-meta {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
    }

    .progress-pct {
      font-size: 26px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -1.5px;
      line-height: 1;
    }

    .progress-right {
      text-align: right;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .progress-speed {
      font-size: 13px;
      font-weight: 600;
      color: #ccc;
    }

    .progress-eta {
      font-size: 11px;
      color: #555;
    }

    .status-msg {
      margin-top: 16px;
      padding: 14px 16px;
      border-radius: 10px;
      font-size: 14px;
      display: none;
    }

    .status-msg.success {
      background: rgba(34,197,94,0.1);
      border: 1px solid rgba(34,197,94,0.3);
      color: #4ade80;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .status-msg.error {
      background: rgba(255,0,0,0.1);
      border: 1px solid rgba(255,0,0,0.25);
      color: #f87171;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .status-msg .icon { font-size: 18px; flex-shrink: 0; }
    .status-msg .text { flex: 1; }
    .status-msg .title { font-weight: 600; margin-bottom: 2px; }
    .status-msg .sub { font-size: 12px; opacity: 0.8; }

    .dl-link-btn {
      margin-top: 10px;
      display: inline-block;
      padding: 10px 20px;
      background: #22c55e;
      color: white;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
      transition: background 0.2s;
    }

    .dl-link-btn:hover { background: #16a34a; }

    footer {
      margin-top: 28px;
      text-align: center;
      font-size: 12px;
      color: #444;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24"><path d="M10 15.5l6-3.5-6-3.5v7zM12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/></svg>
      </div>
      <div class="logo-text">
        <h1>Quick YouTube Downloader</h1>
        <p>Paste a YouTube link and download audio instantly</p>
      </div>
    </div>

    <label for="url-input">YouTube URL</label>
    <div class="url-wrap">
      <input
        id="url-input"
        type="url"
        placeholder="https://www.youtube.com/watch?v=..."
        autocomplete="off"
        spellcheck="false"
      />
      <button class="clear-btn" id="clear-btn" title="Clear">&#x2715;</button>
    </div>

    <button class="dl-btn" id="dl-btn">Download</button>

    <div class="progress-wrap" id="progress-wrap">
      <div class="stages">
        <div class="stage" id="stage-dl">
          <div class="stage-dot"></div>
          <span class="stage-label">Downloading</span>
        </div>
        <div class="stage" id="stage-conv">
          <div class="stage-dot"></div>
          <span class="stage-label">Converting</span>
        </div>
        <div class="stage" id="stage-ready">
          <div class="stage-dot"></div>
          <span class="stage-label">Ready</span>
        </div>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progress-fill"></div>
      </div>
      <div class="progress-meta">
        <span class="progress-pct" id="progress-pct">0%</span>
        <div class="progress-right">
          <span class="progress-speed" id="progress-speed"></span>
          <span class="progress-eta" id="progress-eta"></span>
        </div>
      </div>
    </div>

    <div class="status-msg" id="status-msg"></div>

    <footer>For personal use only &bull; Respect copyright</footer>
  </div>

  <script>
    const urlInput   = document.getElementById('url-input');
    const clearBtn   = document.getElementById('clear-btn');
    const dlBtn      = document.getElementById('dl-btn');
    const progressWrap  = document.getElementById('progress-wrap');
    const progressFill  = document.getElementById('progress-fill');
    const progressPct   = document.getElementById('progress-pct');
    const progressSpeed = document.getElementById('progress-speed');
    const progressEta   = document.getElementById('progress-eta');
    const statusMsg  = document.getElementById('status-msg');
    const stageDl    = document.getElementById('stage-dl');
    const stageConv  = document.getElementById('stage-conv');
    const stageReady = document.getElementById('stage-ready');
    let activeES = null;

    urlInput.addEventListener('input', () => {
      clearBtn.style.display = urlInput.value ? 'block' : 'none';
      hideStatus();
    });

    clearBtn.addEventListener('click', () => {
      urlInput.value = '';
      clearBtn.style.display = 'none';
      urlInput.focus();
      hideStatus();
    });

    function hideStatus() {
      statusMsg.style.display = 'none';
      statusMsg.className = 'status-msg';
      statusMsg.innerHTML = '';
    }

    function showError(msg) {
      statusMsg.className = 'status-msg error';
      statusMsg.innerHTML = `<span class="icon">&#x26A0;</span><div class="text"><div class="title">Download failed</div><div class="sub">${escHtml(msg)}</div></div>`;
      statusMsg.style.display = 'flex';
    }

    function showSuccess(title, jobId) {
      statusMsg.className = 'status-msg success';
      statusMsg.innerHTML = `
        <span class="icon">&#x2713;</span>
        <div class="text">
          <div class="title">${escHtml(title)}</div>
          <div class="sub">Your file is ready!</div>
          <a class="dl-link-btn" href="/api/file/${jobId}" download>Save File</a>
        </div>`;
      statusMsg.style.display = 'flex';
    }

    function escHtml(str) {
      return str.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    function setStage(name) {
      stageDl.className    = 'stage';
      stageConv.className  = 'stage';
      stageReady.className = 'stage';
      if (name === 'downloading') {
        stageDl.classList.add('active');
      } else if (name === 'processing') {
        stageDl.classList.add('done');
        stageConv.classList.add('active');
      } else if (name === 'done') {
        stageDl.classList.add('done');
        stageConv.classList.add('done');
        stageReady.classList.add('done');
      }
    }

    function setProgress(pct) {
      progressFill.classList.remove('indeterminate');
      progressFill.style.width = pct + '%';
      progressPct.textContent = Math.round(pct) + '%';
    }

    function setIndeterminate() {
      progressFill.classList.add('indeterminate');
      progressPct.textContent = '—';
    }

    function resetUI() {
      dlBtn.disabled = false;
      dlBtn.textContent = 'Download';
      progressWrap.style.display = 'none';
      progressFill.classList.remove('indeterminate');
      progressFill.style.width = '0%';
      progressPct.textContent = '0%';
      progressSpeed.textContent = '';
      progressEta.textContent = '';
      stageDl.className = stageConv.className = stageReady.className = 'stage';
    }

    dlBtn.addEventListener('click', async () => {
      const url = urlInput.value.trim();
      if (!url) { urlInput.focus(); return; }

      if (activeES) { activeES.close(); activeES = null; }
      hideStatus();
      dlBtn.disabled = true;
      dlBtn.textContent = 'Starting…';
      progressWrap.style.display = 'block';
      setProgress(0);
      setStage('downloading');

      let jobId;
      try {
        const res = await fetch('/api/start', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url, format: 'm4a' }),
        });
        const data = await res.json();
        if (!res.ok || data.error) throw new Error(data.error || 'Server error');
        jobId = data.job_id;
      } catch (e) {
        showError(e.message);
        resetUI();
        return;
      }

      dlBtn.textContent = 'Downloading…';
      activeES = new EventSource(`/api/progress/${jobId}`);

      activeES.onmessage = (e) => {
        const d = JSON.parse(e.data);

        if (d.status === 'downloading') {
          setStage('downloading');
          setProgress(d.progress || 0);
          progressSpeed.textContent = d.speed || '';
          progressEta.textContent   = d.eta ? `ETA ${d.eta}` : '';
        } else if (d.status === 'processing') {
          setStage('processing');
          setIndeterminate();
          dlBtn.textContent = 'Converting…';
          progressSpeed.textContent = '';
          progressEta.textContent   = '';
        } else if (d.status === 'done') {
          setStage('done');
          setProgress(100);
          activeES.close();
          activeES = null;
          setTimeout(() => {
            progressWrap.style.display = 'none';
            showSuccess(d.title || 'Download complete', jobId);
            resetUI();
          }, 400);
        } else if (d.status === 'error') {
          activeES.close();
          activeES = null;
          showError(d.error || 'Unknown error');
          resetUI();
        }
      };

      activeES.onerror = () => {
        activeES.close();
        activeES = null;
        showError('Connection to server lost. Please try again.');
        resetUI();
      };
    });
  </script>
</body>
</html>
